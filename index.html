    { id: 38, thutuchuong: 23, chapter: "Chương 2", q: "Trong chủ nghĩa tư bản, giai cấp công nhân đại biểu cho phương thức sản xuất:", options: ["Tiên tiến", "Lạc hậu", "Manh mún", "Cả A, B, C"], correct: 0 },
    { id: 39, thutuchuong: 24, chapter: "Chương 2", q: "Điều kiện để giai cấp công nhân phát triển về số lượng và chất lượng", options: ["Phát triển công nghiệp", "Phát triển nền kinh tế", "Phát triển văn hoá-xã hội", "Phát triển giáo dục-đào tạo"], correct: 0 },
    { id: 40, thutuchuong: 25, chapter: "Chương 2", q: "Giai cấp nào không có hệ tư tưởng riêng?", options: ["Giai cấp vô sản", "Giai cấp nông dân", "Giai cấp địa chủ phong kiến", "Giai cấp tư sản"], correct: 1 },
    { id: 41, thutuchuong: 26, chapter: "Chương 2", q: "Giai cấp nào đại diện cho dân tộc?", options: ["Giai cấp thống trị trong quốc gia", "Giai cấp đông đảo nhất trong quốc gia", "Giai cấp công nhân", "Giai cấp tư sản"], correct: 2 },
    { id: 42, thutuchuong: 27, chapter: "Chương 2", q: "Tính hai mặt của người nông dân là gì?", options: ["Người tư hữu và người bóc lột", "Người lao động và tư hữu nhỏ", "Người bị bóc lột và lạc hậu", "Người lao động và người làm thuê"], correct: 1 },    
    { id: 43, thutuchuong: 1, chapter: "Chương 3", q: "Chủ nghĩa xã hội là gì:", options: ["Là 1 phong trào thực tiễn, phong trào đấu tranh của nhân dân lao động chống lại áp bức, bất công, chống các giai cấp thống trị.", "Là trào lưu tư tưởng, lý luận phản ánh lý tưởng giải phóng nhân dân lao động khỏi áp bức, bóc lột, bất công.", "Là một khoa học - khoa học về sứ mệnh lịch sử của giai cấp công nhân.", "Cả a, b, c đều đúng"], correct: 3 },
    { id: 44, thutuchuong: 2, chapter: "Chương 3", q: "Giai đoạn đầu của hình thái kinh tế - xã hội Cộng sản chủ nghĩa là gì?", options: ["Thời kỳ quá độ.", "Chủ nghĩa xã hội", "Chủ nghĩa cộng sản.", "Cả a, b, c."], correct: 1 },
    { id: 45, thutuchuong: 3, chapter: "Chương 3", q: "Câu “Giữa xã hội TBCN và xã hội CSCN là một thời kỳ cải biến cách mạng từ xã hội này sang xã hội kia. Thích ứng với thời kỳ ấy là một thời kỳ quá độ chính trị, và nhà nước của thời kỳ ấy không thể là cái gì khác hơn là nền chuyên chính cách mạng của giai cấp vô sản” là của ai?", options: ["C. Mác", "Ăngghen", "Lênin", "C.Mác & Ăngghen"], correct: 0 },
    { id: 46, thutuchuong: 4, chapter: "Chương 3", q: "Câu “Cần phải có thời kỳ quá độ khá lâu dài từ CNTB lên CNXH” là của ai?", options: ["C.Mác", "Ăngghen", "Lênin", "C.Mác & Ăngghen"], correct: 2 },
    { id: 47, thutuchuong: 5, chapter: "Chương 3", q: "Có mấy hình thức quá độ lên CNXH?", options: ["Hai", "Ba", "Bốn", "Năm"], correct: 0 },
    { id: 48, thutuchuong: 6, chapter: "Chương 3", q: "Quá độ lên CNXH bỏ qua chế độ TBCN là bỏ qua yếu tố nào của CNTB?", options: ["Bỏ qua nhà nước của giai cấp tư sản", "Bỏ qua cơ sở kinh tế của CNTB", "Bỏ qua việc xác lập vị trí thống trị của quạn hệ sản xuất và kiến trúc thượng tầng TBCN", "Bỏ qua chế độ áp bức bóc lột của giai cấp tư sản."], correct: 2 },
    { id: 49, thutuchuong: 7, chapter: "Chương 3", q: "Hình thái kinh tế - xã hội CSCN bắt đầu và kết thúc khi nào?", options: ["Từ khi Đảng cộng sản ra đời và xây dựng xong CNXH", "Bắt đầu từ thời kỳ quá độ cho đến khi xây dựng xong giai đoạn cao của xã hội cộng sản", "Bắt đầu từ giai đoạn cao của xã hội Cộng sản và kết thúc ở giai đoạn cao cảu xã hội cộng sản", "Tất cả đều sai"], correct: 1 },
    { id: 50, thutuchuong: 8, chapter: "Chương 3", q: "Điều kiện ra đời của CNXH là gì:", options: ["Sự phát triển của lực lượng sản xuất", "Sự phát triển vượt bậc cả về chất lượng và số lượng của giai cấp công nhân", "Cả a và b đều đúng", "Cả a và b đều sai"], correct: 2 },
    { id: 51, thutuchuong: 9, chapter: "Chương 3", q: "Chủ nghĩa xã hội có mấy đặc trưng cơ bản?", options: ["Năm", "Sáu", "Bảy", "Tám"], correct: 3 },
    { id: 52, thutuchuong: 10, chapter: "Chương 3", q: "Hai loại quá độ từ CNTB lên CNCS đó là:", options: ["Quá độ cơ bản và quá độ không cơ bản", "Quá độ khách quan và quá độ chủ quan", "Quá độ trực tiếp và quá độ gián tiếp", "Quá độ nhanh chóng và quá độ lâu dài"], correct: 2 },
    { id: 53, thutuchuong: 11, chapter: "Chương 3", q: "Đặc điểm nổi bậc của thời kỳ quá độ đó là:", options: ["Toàn bộ các yếu tố của xã hội bị triệt tiêu", "Những nhân tố của xã hội mới và những tàn tích của xã hội cũ tồn tại đan xen lẫn nhau, đấu tranh với nhau trên mọi lĩnh vực của đời sống kinh tế, chính trị, văn hoá, tư tưởng, tập quán xã hội", "Những yếu tố của xã hội mới đã phát triển hoàn thiện", "Tất cả đều đúng"], correct: 1 },
    { id: 54, thutuchuong: 12, chapter: "Chương 3", q: "Theo Lênin, nền kinh tế trong thời kỳ quá độ tồn tại bao nhiêu thành phần kinh tế", options: ["Ba", "Bốn", "Năm", "Sáu"], correct: 2 },
    { id: 55, thutuchuong: 13, chapter: "Chương 3", q: "Kiểu quá độ lên CNXH ở Việt Nam là kiểu quá độ nào?", options: ["Trực tiếp", "Gián tiếp", "Chủ quan", "Khách quan"], correct: 1 },
    { id: 56, thutuchuong: 14, chapter: "Chương 3", q: "Mô hình CNXH ở Việt Nam hiện nay có mấy đặc trưng cơ bản?", options: ["Năm", "Sáu", "Bảy", "Tám"], correct: 3 },
    { id: 57, thutuchuong: 15, chapter: "Chương 3", q: "Xã hội XHCN ở Việt Nam là xã hội?", options: ["Do nhân dân lao động làm chủ", "Do nhân nhân làm chủ", "Do giai cấp công nhân làm chủ", "Do giai cấp nông dân làm chủ"], correct: 0 },
    { id: 58, thutuchuong: 16, chapter: "Chương 3", q: "Xã hội XHCN ở Việt Nam là xã hội:", options: ["Dân giàu, nước mạnh, công bằng, dân chủ, văn minh", "Dân giàu, nước mạnh, dân chủ, công bằng, văn minh", "Dân giàu, nước mạnh, văn minh, dân chủ, công bằng", "Dân giàu, nước mạnh, văn minh, công bằng, dân chủ"], correct: 1 },
    { id: 59, thutuchuong: 17, chapter: "Chương 3", q: "Tại đại hội XI, Đảng cộng sản Việt Nam đã xác định mấy phương hướng phản ánh con đường đi lên CNXH ở Việt Nam?", options: ["Năm", "Sáu", "Bảy", "Tám"], correct: 3 },
    { id: 60, thutuchuong: 18, chapter: "Chương 3", q: "Xã hội XHCN ở Việt Nam là xã hội:", options: ["Có quan hệ hữu nghị và hợp tác với các nước trên thế giới", "Có quan hệ hữu nghị và hợp tác với tất cả các nước trên thế giới", "Có quan hệ hữu nghị và hợp tác với một vài nước trên thế giới", "Có quan hệ hữu nghị và hợp tác với hầu hết các nước trên thế giới"], correct: 1 },
    { id: 61, thutuchuong: 19, chapter: "Chương 3", q: "Điền từ thiếu vào ô trống : “bước quá độ từ chủ nghĩa tư bản lên chủ nghĩa xã hội kẻ thù chủ yếu của chúng ta là giai cấp …, những tập quán thói quen của giai cấp ấy” (V.I. Lênin )", options: ["Phong kiến", "Nông dân", "Tiểu tư sản", "Tư sản"], correct: 2 },
    { id: 62, thutuchuong: 20, chapter: "Chương 3", q: "Thời kỳ quá độ lên CNXH ở trên phạm vi cả nước ta bắt đầu từ khi nào?", options: ["1930", "1945", "1954", "1975"], correct: 3 },
    { id: 63, thutuchuong: 21, chapter: "Chương 3", q: "Cương lĩnh xây dựng đất nước trong thời kỳ quá độ lên chủ nghĩa xã hội được Đảng ta nêu ra ở Đại hội nào ?", options: ["Đại hội V", "Đại hội VI", "Đại hội VII", "Đại hội VIII"], correct: 2 },
    { id: 64, thutuchuong: 22, chapter: "Chương 3", q: "Trong Văn kiện Đại hội IX, Đảng ta xác định phải tiếp thu và kế thừa những gì của chủ nghĩa tư bản trong thời kỳ quá độ lên chủ nghĩa xã hội ở Việt Nam?", options: ["Tiếp thu, kế thừa những thành tựu mà nhân loại đã đạt được dưới chế độ tư bản chủ nghĩa, đặc biệt về khoa học và công nghệ, để phtá triển nhanh lực lượng sản xuất, xây dựng nền kinh tế hiện đại.", "Tiếp thu, kế thừa mô hình quản lý kinh tế - xã hội và thành tựu khoa học công nghệ.", "Tiếp thu, kế thừa những giá trị kinh tế, chính trị, văn hoá - xã hội và pháp luật trong chủ nghĩa tư bản.", "Cả ba đều sai"], correct: 2 },
    { id: 65, thutuchuong: 23, chapter: "Chương 3", q: "“Thời kì phát triển mới - đẩy mạnh công nghiệp hoá, hiện đại hoá đất nước” được Đảng ta nêu ra ở Đại hội nào?", options: ["Đại hội VI", "Đại hội VII", "Đại hội VIII", "Đại hội IX"], correct: 0 },
    { id: 66, thutuchuong: 24, chapter: "Chương 3", q: "Điền từ còn thiếu vào chỗ trống: Đảng cộng sản Việt Nam ra đời là sản phẩm của sự kết hợp chủ nghĩa Mác - Lênin, với phong trào công nhân và ở nước ta vào những năm cuối thập kỷ của thế kỷ XX.", options: ["Chủ nghĩa yêu nước", "Phong trào yêu nước", "Truyền thống yêu nước", "Truyền thống dân tộc"], correct: 2 },
    { id: 67, thutuchuong: 25, chapter: "Chương 3", q: "Cách mạng xã hội chủ nghĩa theo nghĩa rộng là:", options: ["Là một cuộc cách mạng chính trị được kết thúc bằng việc giai cấp công nhân cùng với nhân dân lao động giành được chính quyền, thiết lập nhà nước chuyên chính vô sản.", "Là một cuộc cách mạng có nội dung chủ yếu về mặt kinh tế dưới sự lãnh đạo của giai cấp công nhân để xây dựng chủ nghĩa xã hội và chủ nghĩa cộng sản.", "Là quá trình cải biến một cách toàn diện trên tất cả lĩnh vực của đời sống xã hội từ kinh tế, chính trị, văn hoá, tư tưởng…. để xây dựng chủ nghĩa xã hội và cuối cùng là chủ nghĩa cộng sản", "Là cuộc cách mạng của giai cấp công nhân cùng với nhân dân lao động đánh đổ sự thống trị của giai cấp tư sản và lật đổ chủ nghĩa tư bản."], correct: 1 },
    { id: 68, thutuchuong: 26, chapter: "Chương 3", q: "Tại sao cho rằng con đường cách mạng Việt Nam là quá độ lên chủ nghĩa xã hội bỏ qua chế độ tư bản chủ nghĩa là một tất yếu?", options: ["Đảng cộng sản Việt Nam đã có đường lối đúng đắn", "Do sự phát triển của lực lượng sản xuất", "Vì nó phù hợp với đặc điểm của đất nước và xu thế phát triển của thời đại", "Vì nó đáp ứng được nguyện vọng và mong ước của nhân dân ta"], correct: 2 },
    { id: 69, thutuchuong: 27, chapter: "Chương 3", q: "Cơ sở để xác định thời đại và phân chia thời đại là gì?", options: ["Hình thái kinh tế - xã hội và vị trí của một giai cấp đứng ở vị trí trung tâm", "Vị trí của một giai cấp đứng ở vị trí trung tâm", "Sự phát triển của lực lượng sản xuất và một quan hệ sản xuất phù hợp", "Cách mạng xã hội chủ nghĩa do giai cấp công nhân lãnh đạo thành công"], correct: 0 },
    { id: 70, thutuchuong: 28, chapter: "Chương 3", q: "Điền từ còn thiếu vào chỗ trống: Cách mạng tư tưởng và văn hoá là cần thiết và tất yếu để thay đổi ... tinh thần, làm cho ... tinh thần của xã hội phù hợp với phương thức sản xuất mới xét về mặt kinh tế đã hình thành.", options: ["Đời sống - đời sống", "Phương thức sản xuất – phương thức sản xuất", "Văn hoá - văn hoá", "Đời sống văn hoá - đời sống văn hoá"], correct: 0 },
    { id: 71, thutuchuong: 29, chapter: "Chương 3", q: "Tính tất yếu của cách mạng xã hội chủ nghĩa trên lĩnh vực tư tưởng và văn hoá là gì?", options: ["Xuất phát từ cuộc đấu tranh giai cấp trên lĩnh vực tư tưởng và văn hoá trong thời đại ngày nay", "Xuất phát từ sự đòi hỏi thay đổi phương thức sản xuất tinh thần", "Xuất phát từ yêu cầu: văn hoá là mục tiêu và động lực cuả quá trình xây dựng chủ nghĩa xã hội", "Cả a, b và c"], correct: 3 },
    { id: 72, thutuchuong: 30, chapter: "Chương 3", q: "Đặc điểm cơ bản của thời kỳ quá độ lên chủ nghĩa xã hội trên lĩnh vực xã hội là:", options: ["Thực hiện thắng lợi sự nghiệp công nghiệp hóa, hiện đại hóa theo định hướng xã hội chủ nghĩa", "Đấu tranh làm thất bại mọi âm mưu và hành động chống phá của các thế lực thù địch, bảo vệ độc lập dân tộc", "Là thời kỳ đấu tranh giai cấp chống áp bức, bất công, xóa bỏ tệ nạn xã hội và những tàn dư của xã hội cũ để lại, thiết lập công bằng xã hội trên cơ sở thực hiện nguyên tắc phân phối theo lao động là chủ đạo", "Đấu tranh ngăn chặn và khắc phục những tư tưởng và hành động sai trái."], correct: 3 },
    { id: 73, thutuchuong: 31, chapter: "Chương 3", q: "Những tiền đề vật chất quan trọng nhất cho sự ra đời của chủ nghĩa xã hội:", options: ["Sự phát triển của lực lượng sản xuất và sự trưởng thành của giai cấp công nhân", "Giai cấp công nhân trưởng thành và trở thành một lực lượng chính trị độc lập", "Sản xuất vật chất phát triển tạo ra một lượng hàng hóa khổng lồ", "Sự lớn mạnh của giai cấp vô sản và sự phát triển của quan hệ sản xuất tư bản chủ nghĩa"], correct: 2 },
    { id: 74, thutuchuong: 32, chapter: "Chương 3", q: "Quy luật chung, phổ biến cho sự ra đời của Đảng Cộng sản:", options: ["Chủ nghĩa Mác- Lênin kết hợp với phong trào công nhân và nhân dân lao động", "Sự kết hợp giữa chủ nghĩa Mác-Lênin với phong trào công nhân", "Chủ nghĩa Mác-Lênin kết hợp với phong trào nông dân", "Chủ nghĩa Lênin kết hợp với phong trào công nhân"], correct: 0 },

    { id: 122, thutuchuong: 15, chapter: "Chương 5", q: "Điền từ vào ô trống: “Lực lượng sản xuất hàng đầu của nhân loại là…, là người lao động” ( V.I.Lênin).", options: ["Khoa học kỹ thuật", "Nền đại công nghiệp", "Công nhân", "Trí thức"], correct: 2 },
    { id: 123, thutuchuong: 16, chapter: "Chương 5", q: "Cơ cấu xã hội nào có vai trò quan trọng nhất?", options: ["Cơ cấu dân cư", "Cơ cấu nghề nghiệp", "Cơ cấu dân tộc", "Cơ cấu giai cấp"], correct: 3 },
    { id: 124, thutuchuong: 17, chapter: "Chương 5", q: "Liên minh giai cấp công-nông-trí thức là gì?", options: ["Sự hợp tác giai cấp đặc biệt giữa họ trong cách mạng XHCN", "Liên kết kinh tế giữa họ trong quá trình xây dựng CNXH", "Đấu tranh giai cấp rất gay gắt giữa họ", "Sự hợp tác kinh tế giữa thành thị với nông thôn"], correct: 0 },    
    { id: 125, thutuchuong: 1, chapter: "Chương 6", q: "Khái niệm nào trong sau đây được dùng để chỉ một cộng đồng người ổn định được hình thành trong lịch sử trong một lãnh thổ nhất định, có chung mối liên hệ về kinh tế, ngôn ngữ và một nền văn hoá?", options: ["Bộ lạc", "Dân tộc", "Quốc gia", "Bộ tộc"], correct: 1 },
    { id: 126, thutuchuong: 2, chapter: "Chương 6", q: "Nội dung cương lĩnh dân tộc của chủ nghĩa Mác - Lênin là:", options: ["Các dân tộc hoàn toàn bình đẳng, các dân tộc được quyền tự quyết, liên hiệp công nhân tất cả các dân tộc lại", "Các dân tộc đoàn kết, bình đẳng và liên hiệp công nhân tất cả các dân tộc lại", "Các dân tộc có quyền tự quyết, các dân tộc có quyền bình đẳng, liên hiệp công nhân tất cả các dân tộc lại", "Các dân tộc hoàn toàn bình đẳng, tự quyết và liên hiệp công nhân các nước"], correct: 0 },
    { id: 127, thutuchuong: 3, chapter: "Chương 6", q: "Điền từ còn thiếu vào chỗ trống: Quyền dân tộc tự quyết là quyền làm chủ của mỗi dân tộc đối với vận mệnh dân tộc mình, quyền tự quyết định chế độ chính trị – xã hội và ... phát triển của dân tộc mình.", options: ["Cách thức", "Con đường", "Mục tiêu", "Hình thức"], correct: 1 },
    { id: 128, thutuchuong: 4, chapter: "Chương 6", q: "Trong các nội dung của quyền dân tộc tự quyết thì nội dung nào được coi là cơ bản nhất, tiên quyết nhất?", options: ["Tự quyết về chính trị", "Tự quyết về kinh tế", "Tự quyết về văn hoá", "Tự quyết về lãnh thổ"], correct: 0 },
    { id: 129, thutuchuong: 5, chapter: "Chương 6", q: "Trong một quốc gia đa tộc người thì vấn đề gì cần giải quyết được coi là có ý nghĩa cơ bản nhất để thực hiện quyền bình đẳng giữa các dân tộc?", options: ["Ban hành hệ thống hiến pháp và pháp luật về quyền bình đẳng giữa các dân tộc", "Chống tư tưởng phân biệt chủng tộc, kì thị và chia rẽ dân tộc", "Nâng cao trình độ dân trí, văn hoá cho đồng bào", "Xoá bỏ dần sự chênh lệch về mọi mặt giữa các dân tộc do lịch sử để lại"], correct: 0 },
    { id: 130, thutuchuong: 6, chapter: "Chương 6", q: "Hiện nay các dân tộc thiểu số ở nước ta có dân số chiếm tỉ lệ bao nhiêu phần trăm số dân cả nước:", options: ["15%", "13,5%", "13%", "17%"], correct: 2 },
    { id: 131, thutuchuong: 7, chapter: "Chương 6", q: "Đặc trưng nổi bật trong quan hệ giữa các dân tộc ở nước ta là:", options: ["Là sự phân bố đan xen nhau, không một dân tộc nào có lãnh thổ riêng", "Là sự cố kết dân tộc, hoà hợp dân tộc trong một cộng đồng thống nhất", "Là có sự chênh lệch về trình độ phát triển kinh tế - xã hội giữa các dân tộc", "Là các dân tộc có bản sắc văn hoá riêng, đa dạng, phong phú."], correct: 0 },
    { id: 132, thutuchuong: 8, chapter: "Chương 6", q: "Nghị quyết “Về phát huy sức mạnh đại đoàn kết dân tộc vì dân giàu nước mạnh, xã hội công bằng, dân chủ, văn minh” được đề cập đến ở Hội nghị Trung ương nào?", options: ["Hội nghị Trung ương II khoá VII", "Hội nghị Trung ương V khoá VIII", "Hội nghị Trung ương VI khoá VIII", "Hội nghị Trung ương VII khoá IX"], correct: 3 },
    { id: 133, thutuchuong: 9, chapter: "Chương 6", q: "Để tăng cường, củng cố khối đại đoàn kết dân tộc ở nước ta hiện nay thì chính sách cụ thể nào của Đảng và Nhà nước ta được coi là vấn đề cực kỳ quan trọng?", options: ["Tôn trọng lợi ích, truyền thống, văn hoá của các dân tộc", "Phát huy truyền thống đoàn kết giữa các dân tộc", "Phát triển kinh tế hàng hoá ở các vùng dân tộc thiểu số", "Tăng cường bồi dưỡng, đào tạo đội ngũ cán bộ là người dân tộc thiểu số"], correct: 0 },
    { id: 134, thutuchuong: 10, chapter: "Chương 6", q: "Hãy tìm ý đúng trong các phương án dưới đây. Trong Văn kiện Đại hội đại biểu toàn quốc lần thứ IX, Đảng Cộng sản Việt Nam đã nêu rõ:", options: ["Vấn đề dân tộc có vai trò quan trọng đối với sự nghiệp phát triển kinh tế - xã hội ở nước ta hiện nay", "Vấn đề dân tộc và đoàn kết các dân tộc luôn có vị trí chiến lược trong sự nghiệp cách mạng", "Vấn đề dân tộc và đoàn kết các dân tộc có vị trí quyết định đến sự sống còn của dân tộc ta hiện nay", "Vấn đề dân tộc và tăng cường khối đại đoàn kết toàn dân tộc là vấn đề chiến lược của Việt Nam hiện nay"], correct: 3 },
    { id: 135, thutuchuong: 11, chapter: "Chương 6", q: "Tôn giáo hình thành là do:", options: ["Trình độ nhận thức", "Trong xã hội có áp bức bóc lột", "Do tâm lý, tình cảm.", "Cả a, b và c"], correct: 3 },
    { id: 136, thutuchuong: 12, chapter: "Chương 6", q: "Hiện nay tôn giáo nào ở Việt Nam có số lượng tín đồ đông nhất?", options: ["Phật giáo", "Tin lành", "Công giáo", "Hồi giáo"], correct: 0 },
    { id: 137, thutuchuong: 13, chapter: "Chương 6", q: "Chủ nghĩa xã hội nghiên cứu vấn đề tín ngưỡng, tôn giáo dưới góc độ nào?", options: ["Góc độ chính trị-xã hội.", "Hình thái ý thức xã hội.", "Tâm lý-xã hội", "Cả a, b và c"], correct: 0 },
    { id: 138, thutuchuong: 14, chapter: "Chương 6", q: "Bản chất của tôn giáo là gì?", options: ["Là sự phản ánh hiện thực khách quan và tồn tại xã hội.", "Là sự phản ánh thế giới quan của con người đối với xã hội.", "Là một hình thái ý thức xã hội nó phản ánh một cách hoang đường hư ảo cái hiện thực khách quan và đầu óc con người. Tôn giáo thể hiện sự bất lực của con người trước tự nhiên và xã hội", "Cả a, b và c"], correct: 2 },
    { id: 139, thutuchuong: 15, chapter: "Chương 6", q: "Cơ sở tồn tại của tôn giáo là gì?", options: ["Nhận thức của con người đối với thế giới khách quan", "Niềm tin của con người", "Sự tưởng tượng của con người", "Tồn tại xã hội"], correct: 3 },
    { id: 140, thutuchuong: 16, chapter: "Chương 6", q: "Nguồn gốc kinh tế - xã hội của tôn giáo là:", options: ["Trình độ phát triển lực lượng sản xuất", "Do sự bần cùng về kinh tế, áp bức về chính trị của con người", "Do sự thất vọng, bất lực của con người trước những bất công xã hội", "Cả a, b và c"], correct: 3 },
    { id: 141, thutuchuong: 17, chapter: "Chương 6", q: "Tôn giáo là một phạm trù lịch sử bởi vì:", options: ["Là sản phẩm của con người", "Là do điều kiện kinh tế - xã hội sinh ra", "Tôn giáo ra đời, tồn tại và biến đổi trong một giai đoạn lịch sử nhất định của loài người", "Tôn giáo sẽ tồn tại và phát triển cùng với sự phát triển của lịch sử nhân loại"], correct: 2 },
    { id: 142, thutuchuong: 18, chapter: "Chương 6", q: "Khi nào thì tôn giáo chính mang tính trị?", options: ["Phản ánh nguyện vọng của nhân dân", "Khi các cuộc chiến tranh tôn giáo nổ ra", "Khi các giai cấp thống trị đã lợi dụng và sử dụng tôn giáo để phục vụ lợi ích của mình", "Cả a và b"], correct: 2 },
    { id: 143, thutuchuong: 19, chapter: "Chương 6", q: "Điền từ còn thiếu vào chỗ trống: Tôn trọng, bảo đảm quyền tự do ... và không ... của nhân dân", options: ["Tôn giáo", "Tín ngưỡng", "Tín ngưỡng - tôn giáo", "Tôn giáo - tín ngưỡng"], correct: 2 },

    { id: 147, thutuchuong: 23, chapter: "Chương 6", q: "Giữa chủ nghĩa Mác - Lênin và hệ tư tưởng tôn giáo khác nhau ở điểm nào?", options: ["Khác nhau về thế giới quan", "Khác nhau về nhân sinh quan", "Khác nhau ở con đường mưu cầu hạnh phúc cho nhân dân", "Cả a, b và c"], correct: 3 },
    { id: 148, thutuchuong: 24, chapter: "Chương 6", q: "Những nguyên tắc cơ bản của chủ nghĩa Mác Lênin trong việc giải quyết vấn đề dân tộc là", options: ["Các dân tộc hoàn toàn bình đẳng", "Các dân tộc được quyền tự quyết", "Liên hiệp công nhân tất cả các dân tộc", "Tất cả các câu đều đúng"], correct: 3 },
    { id: 149, thutuchuong: 25, chapter: "Chương 6", q: "Nguyên nhân nhận thức cho sự tồn tại của tín ngưỡng, tôn giáo là", options: ["Con người sợ sệt thần linh", "Con người chưa nhận thức và chế ngự được các hiện tượng tự nhiên, xã hội", "Con người huy động sức mạnh của thần linh", "Tất cả các câu đều sai"], correct: 1 },
    { id: 150, thutuchuong: 26, chapter: "Chương 6", q: "Các sắp xếp nào sau đây đúng về sự xuất hiện của các tộc người trong lịch sử?", options: ["Thi tộc, bộ lạc, thị tộc, dân tộc", "Bộ tộc, bộ lạc, thi tộc, dân tộc", "Bộ lạc, thị tộc, bộ tộc, dân tộc", "Tất cả các câu đều sai"], correct: 3 },

    { id: 153, thutuchuong: 29, chapter: "Chương 6", q: "Khái niệm nào sau đây được dung để chỉ một cộng đồng người ổn định được hình thành trong lịch sử trong một lãnh thổ nhất định, có chung mối liên hệ về kinh tế, ngôn ngữ và một nền văn hoá?", options: ["Bộ tộc", "Bộ lạc", "Dân tộc", "Quốc gia"], correct: 2 },
    { id: 154, thutuchuong: 30, chapter: "Chương 6", q: "Chỉ ra luận điểm đúng:", options: ["Con người là sản phẩm của tôn giáo", "Tôn giáo là vĩnh hằng, bất biến", "Tôn giáo quyết định số phận của con người", "Tôn giáo là sản phẩm của con người"], correct: 3 },

        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let selectedOption = null;
        let wrongQuestionsList = []; 

        // Hàm xáo trộn cả THỨ TỰ CÂU HỎI lẫn THỨ TỰ ĐÁP ÁN của từng câu câu đó
        function shuffleQuestionsAndOptions() {
            // Bước 1: Tạo bản sao sâu cấu trúc dữ liệu gốc
            quizData = originalQuizData.map(item => {
                let optionsCopy = [...item.options];
                let originalCorrectOptionText = item.options[item.correct]; // Lấy nội dung chữ của đáp án đúng gốc

                // Thuật toán Fisher-Yates xáo trộn nội dung mảng đáp án của chính câu này
                for (let i = optionsCopy.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [optionsCopy[i], optionsCopy[j]] = [optionsCopy[j], optionsCopy[i]];
                }

                // Tìm lại xem vị trí mới của đáp án đúng đang nằm ở index thứ mấy sau khi tráo
                let newCorrectIndex = optionsCopy.indexOf(originalCorrectOptionText);

                return {
                    id: item.id,
                    q: item.q,
                    options: optionsCopy,
                    correct: newCorrectIndex,
                    thutuchuong: item.thutuchuong,
                    chapter: item.chapter
                };
            });
            
            // Bước 2: Xáo trộn ngẫu nhiên thứ tự xuất hiện của toàn bộ danh sách các câu hỏi
            for (let i = quizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

                            </h3>
                            <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                                ${wrongQuestionsList.map((item) => {
                                    let optionsReviewHTML = '';
                                    item.options.forEach((opt, idx) => {
                                        let badgeHTML = '';
                                        let itemClass = "p-3 rounded-lg text-sm border ";
                                        
                                        if (idx === item.correct) {
                                            itemClass += "bg-green-50 border-green-300 text-green-800 font-medium";
                                            badgeHTML = `<span class="ml-2 bg-green-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">ĐÁP ÁN ĐÚNG</span>`;
                                        } else if (idx === item.userChoice) {
                                            itemClass += "bg-red-50 border-red-300 text-red-800 font-medium";
                                            badgeHTML = `<span class="ml-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">BẠN ĐÃ CHỌN LÚC TRƯỚC</span>`;
                                        } else {
                                            itemClass += "bg-gray-50 border-gray-100 text-gray-500 opacity-60";
                                        }

                                        optionsReviewHTML += `
                                            <div class="${itemClass} flex justify-between items-center">
                                                <span>${opt}</span>
                                                ${badgeHTML}
                                            </div>
                                        `;
                                    });

                                    return `
                                        <div class="p-5 bg-white border-2 border-red-100 rounded-2xl shadow-sm space-y-3">
                                            <p class="text-gray-800 font-semibold leading-tight">
                                                <span class="text-indigo-600">[Câu gốc số ${item.id}]:</span> ${item.q}
                                            </p>
                                            <div class="space-y-2">
                                                ${optionsReviewHTML}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    wrongListHTML = `
                        <div class="mt-6 p-4 bg-green-50 border-l-4 border-green-500 rounded-r-xl text-left">
                            <p class="text-green-800 font-semibold">🎉 Quá đỉnh! Bạn không làm sai câu nào cả.</p>
                        </div>
                    `;
                }

                app.innerHTML = `
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-xl mx-auto text-center animate-fade-in">
                        <h2 class="text-3xl font-bold mb-4 text-indigo-600">Kết quả</h2>
                        <p class="text-xl mb-6 text-gray-600">Bạn đã hoàn thành xong bộ câu hỏi xáo trộn!</p>
                        <div class="text-5xl font-bold mb-8 text-gray-800">${score} / 200</div>
                        <button onclick="restartQuiz()" class="w-full bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition shadow-lg mb-4">Làm lượt mới (Xáo trộn lại)</button>
                        ${wrongListHTML}
                    </div>
                `;
                return;
            }

            const currentQuestion = quizData[currentIndex];
            const progressWidth = ((currentIndex + 1) / quizData.length) * 100;

            let optionsHTML = '';
            currentQuestion.options.forEach((opt, idx) => {
                let btnClass = "w-full p-4 text-left rounded-xl border-2 transition-all duration-200 font-medium text-gray-700 ";
                let disabledAttr = '';

                if (selectedOption === null) {
                    btnClass += "border-gray-100 hover:border-indigo-300 hover:bg-indigo-50";
                } else {
                    disabledAttr = 'disabled';
                    if (idx === currentQuestion.correct) {
                        btnClass += "border-green-500 bg-green-50 text-green-700";
                    } else if (idx === selectedOption) {
                        btnClass += "border-red-500 bg-red-50 text-red-700";
                    } else {
                        btnClass += "border-gray-100 opacity-40";
                    }
                }

                optionsHTML += `
                    <button 
                        onclick="handleOptionClick(${idx})"
                        class="${btnClass}"
                        ${disabledAttr}
                    >
                        ${opt}
                    </button>
                `;
            });

            let feedbackHTML = '';
            if (selectedOption !== null) {
                feedbackHTML = `
                    <div class="mt-6">
                        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-lg">
                            <p class="text-blue-800 font-semibold">
                                🔍 Đối chiếu tài liệu gốc "Triết_hoc_mac.docx": <span class="text-indigo-600 text-lg">Câu số ${currentQuestion.thutuchuong}, ${currentQuestion.chapter}</span>
                            </p>
                        </div>
                        <button 
                            onclick="handleNext()"
                            class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold hover:bg-black transition shadow-lg"
                        >
                            Tiếp tục
                        </button>
                    </div>
                `;
            }

            app.innerHTML = `
                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
                    <div class="bg-gray-200 h-2">
                        <div class="bg-indigo-500 h-full transition-all duration-300" style="width: ${progressWidth}%"></div>
                    </div>

                    <div class="p-6 md:p-10">
                        <div class="flex justify-between items-center mb-6">
                            <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold">
                                Câu hiện tại: ${currentIndex + 1} / 200
                            </span>
                            <span class="text-gray-500 font-bold">Điểm số: ${score}</span>
                        </div>

                        <h1 class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-tight">
                            ${currentQuestion.q}
                        </h1>

                        <div class="space-y-4">
                            ${optionsHTML}
                        </div>

                        ${feedbackHTML}
                    </div>
                </div>
            `;
        }

        function handleOptionClick(idx) {
            if (selectedOption !== null) return;
            selectedOption = idx;
            const currentQuestion = quizData[currentIndex];
            
            if (idx === currentQuestion.correct) {
                score++;
            } else {
                wrongQuestionsList.push({
                    id: currentQuestion.id,
                    q: currentQuestion.q,
                    options: [...currentQuestion.options],
                    correct: currentQuestion.correct,
                    userChoice: idx
                });
            }
            render();
        }

        function handleNext() {
            currentIndex++;
            selectedOption = null;
            render();
        }

        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            selectedOption = null;
            wrongQuestionsList = []; 
            shuffleQuestionsAndOptions(); // Tráo đổi lại cả câu và đáp án cho lượt mới
            render();
        }

        shuffleQuestionsAndOptions();
        render();
    </script>
</body>
</html>
